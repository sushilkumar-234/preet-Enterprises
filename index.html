<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shoe Store | E-Commerce</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:#f5f5f5}
    header{background:#111;color:#fff;padding:15px 30px;display:flex;justify-content:space-between;align-items:center}
    header h1{font-size:22px}
    nav a{color:#fff;margin:0 10px;text-decoration:none;font-weight:bold}
    .container{padding:30px}
    .products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
    .card{background:#fff;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,.1);padding:15px;text-align:center}
    .card img{width:100%;height:160px;object-fit:cover;border-radius:10px}
    .card h3{margin:10px 0}
    .card button{background:#111;color:#fff;border:none;padding:10px 15px;border-radius:5px;cursor:pointer}
    .card button:hover{background:#444}
    #cart{position:fixed;right:0;top:0;width:320px;height:100%;background:#fff;box-shadow:-2px 0 10px rgba(0,0,0,.2);padding:20px;display:none}
    #cart h2{text-align:center;margin-bottom:10px}
    .cart-item{display:flex;justify-content:space-between;margin:8px 0}
    .total{font-weight:bold;margin-top:10px}
    footer{text-align:center;background:#111;color:#fff;padding:15px;margin-top:30px}
  </style>
</head>
<body>

<header>
  <h1>ShoeMart</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#" onclick="toggleCart()">Cart 🛒</a>
    <a href="#">Login</a>
  </nav>
</header>

<div class="container">
  <h2>Latest Shoes</h2><br>
  <div class="products" id="productList"></div>
</div>

<div id="cart">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <p class="total">Total: ₹<span id="total">0</span></p>
  <button onclick="checkout()">Checkout</button>
</div>

<footer>
  <p>© 2026 ShoeMart | All Rights Reserved</p>
</footer>

<script>
  const products = [
    {id:1,name:'Nike Air',price:4999,img:'https://via.placeholder.com/300x200'},
    {id:2,name:'Adidas Run',price:3999,img:'https://via.placeholder.com/300x200'},
    {id:3,name:'Puma Sport',price:2999,img:'https://via.placeholder.com/300x200'},
    {id:4,name:'Reebok Classic',price:3599,img:'https://via.placeholder.com/300x200'}
  ];

  let cart = [];

  const productList = document.getElementById('productList');
  const cartItems = document.getElementById('cartItems');
  const totalEl = document.getElementById('total');

  products.forEach(p=>{
    const div=document.createElement('div');
    div.className='card';
    div.innerHTML=`<img src="${p.img}"><h3>${p.name}</h3><p>₹${p.price}</p><button onclick="addToCart(${p.id})">Add to Cart</button>`;
    productList.appendChild(div);
  });

  function addToCart(id){
    const product=products.find(p=>p.id===id);
    cart.push(product);
    renderCart();
  }

  function renderCart(){
    cartItems.innerHTML='';
    let total=0;
    cart.forEach((item,i)=>{
      total+=item.price;
      cartItems.innerHTML+=`<div class='cart-item'><span>${item.name}</span><span>₹${item.price}</span></div>`;
    });
    totalEl.textContent=total;
  }

  function toggleCart(){
    const c=document.getElementById('cart');
    c.style.display=c.style.display==='block'?'none':'block';
  }

  function checkout(){
    alert('Order placed successfully!');
    cart=[];
    renderCart();
    toggleCart();
  }
</script>

</body>
</html>
